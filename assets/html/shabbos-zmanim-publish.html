<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohel Tefilla Zmanim</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant:wght@200..800">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <style>
        p,
        h1,
        h2,
        small {
            text-align: center;
            align-items: center;
            font-family: 'Assistant', serif;
            color: #171441;
            direction: rtl;
        }

        #zmanim {
            /* padding: 10px; */
            background-image: url("/assets/img/zmanim-background.png");
            width: 1414px;
            height: 2000px;
        }

        #timesheet {
            padding-top: 200px;
            margin: 120px;
        }

        h1 {
            font-size: 100px;
            font-weight: 800;
            margin-bottom: 50px;
        }

        h2 {
            font-size: 70px;
            font-weight: 700;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        p {
            font-size: 60px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        small {
            font-size: 30px;
            margin-top: 5px;
        }

        #download {
            background-color: #7e97b8;
            /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            display: none;
            font-size: 16px;
            border-radius: 4%;
        }

        .framed {
            border: 5px solid;
            border-color: #171441;
            border-radius: 15px;
            width: fit-content;
            block-size: fit-content;
            margin: auto;
            margin-top: 90px
        }

        .framed p {
            margin: 20px;
        }

        .column {
            float: right;
            width: 50%;
        }

        /* Clear floats after the columns */
        .row:after {
            content: "";
            display: table;
            clear: both;
        }

        .note {
            font-size: 45px;
            font-weight: bold;
        }

        .withcomment {
            margin-bottom: 5px;
        }
    </style>
    <div id="zmanim" style="text-align: center;" contenteditable>
        <div id="timesheet">
            <h1 id="parasha">שבת</h1>
            <div class="row">
                <div class="column">
                    <h2>ליל שבת</h2>
                    <p class="withcomment">הדלקת נרות: <span id="candle-light"></span></p>
                    <small>&rlm;40 דקות לפני השקיעה</small>
                    <p>מנחה וקבלת שבת: <span id="mincha"></span></p>
                </div>
                <div class="column">
                    <h2>יום שבת</h2>
                    <p>שחרית: 8:40</p>
                    <p>שוכן עד: 9:00</p>
                    <small>סוזק"ש: <span id="sofZmanShma"></span></small>
                    <p class="note">קידוש לאחר התפילה</p>
                    <!-- <p class="note">דף יומי: 17:30</p> -->
                    <p class="note">דף יומי: <span id="dafYomiShabbat"></span></p>
                    <p class="note">אבות ובנים: <span id="avotUbanim"></span></p>
                    <p>מנחה: <span id="shabbatMincha"></span></p>
                    <!-- <p>מנחה: 18:30</p> -->
                    <p>מעריב וצאת שבת: <span id="maariv"></span></p>
                </div>
            </div>
            <div class="row">
                <div class="framed">
                    <p style="font-size: 40px;">התפילות מתקיימות באופן זמני<br>בחגואל 19<br>כניסה מימין לבניין</p>
                </div>
            </div>
            <h1>שבת שלום לכולם</h1>

        </div>

    </div>
    <button id="download">Download</button>
    <script src="/assets/js/update_zmanim.js"></script>
</body>

</html>
